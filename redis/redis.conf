# Redis 配置文件
# 基本配置

# 绑定地址 - 允许所有网络接口
bind 0.0.0.0

# 端口
port 6379

# 数据持久化
save 900 1
save 300 10
save 60 10000

# AOF 持久化
appendonly yes
appendfsync everysec

# 内存管理
maxmemory 256mb
maxmemory-policy allkeys-lru

# 日志级别
loglevel notice

# 数据库数量
databases 16

# 超时设置
timeout 0

# TCP keepalive
tcp-keepalive 300
