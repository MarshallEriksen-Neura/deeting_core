# DeetingOS System Plugins Registry
# This file defines the "Standard Library" of plugins available to the Agent Runtime.
# ID must match the 'name' in PluginMetadata.

plugins:
  # === Core Sensors (Scout) ===
  - id: "core.tools.crawler"
    name: "Scout (Web Crawler)"
    module: "app.agent_plugins.builtins.crawler.plugin"
    class_name: "CrawlerPlugin"
    enabled_by_default: true
    description: "Deep web crawling, site ingestion, and documentation learning."
    tools:
      - "fetch_web_content"
      - "crawl_website"
      - "submit_repo_ingestion"
      - "convert_artifact_to_assistant"
      - "batch_convert_artifact_to_assistants"

  # === Core Memory (Qdrant) ===
  - id: "system/vector_store"
    name: "Vector Memory"
    module: "app.agent_plugins.builtins.vector_store.plugin"
    class_name: "VectorStorePlugin"
    enabled_by_default: true
    is_always_on: true
    description: "Semantic search and long-term memory management."
    tools:
      - "search_knowledge"
      - "add_knowledge_chunk"

  # === Core Administration (Provider) ===
  - id: "core.registry.provider"
    name: "Provider Registry"
    module: "app.agent_plugins.builtins.provider_registry.plugin"
    class_name: "ProviderRegistryPlugin"
    enabled_by_default: false
    restricted: true
    allowed_roles: ["admin"]
    description: "Manage AI Provider configurations and schemas."
    tools:
      - "get_unified_schema"
      - "verify_provider_template"
      - "save_provider_field_mapping"

  - id: "system/database_manager"
    name: "Database Manager"
    module: "app.agent_plugins.builtins.database.plugin"
    class_name: "DatabasePlugin"
    enabled_by_default: false
    restricted: true
    allowed_roles: ["admin"]
    description: "Manage Provider Presets metadata and lifecycle."
    tools:
      - "check_provider_preset_exists"
      - "create_provider_preset"
      - "update_provider_preset"

  # === Other Utilities ===
  - id: "system.code_interpreter"
    name: "Code Interpreter"
    module: "app.agent_plugins.builtins.code_interpreter.plugin"
    class_name: "CodeInterpreterPlugin"
    enabled_by_default: true
    tools:
      - "run_python"

  - id: "system.image_generation"
    name: "Image Generation"
    module: "app.agent_plugins.builtins.image_generation.plugin"
    class_name: "ImageGenerationPlugin"
    enabled_by_default: true
    tools:
      - "generate_image"

  - id: "system.planner"
    name: "Planner"
    module: "app.agent_plugins.builtins.planner.plugin"
    class_name: "PlannerPlugin"
    enabled_by_default: true
    tools:
      - "create_plan"

  # === Expert Network (JIT Persona Routing) ===
  - id: "system.expert_network"
    name: "Expert Network"
    module: "app.agent_plugins.builtins.expert_network.plugin"
    class_name: "ExpertNetworkPlugin"
    enabled_by_default: true
    is_always_on: true
    description: "Searches expert assistants for persona routing via Qdrant."
    tools:
      - "consult_expert_network"

  # === Core Execution (Skill Runner) ===
  - id: "core.execution.skill_runner"
    name: "Skill Runner"
    module: "app.agent_plugins.builtins.skill_runner.plugin"
    class_name: "SkillRunnerPlugin"
    enabled_by_default: true
    is_always_on: true
    description: "Executes JIT-retrieved skills via OpenSandbox."
    tools: [] # Dynamic skills

  # === Code Mode Core SDK ===
  - id: "system.deeting_core_sdk"
    name: "Deeting Core SDK"
    module: "app.agent_plugins.builtins.deeting_core_sdk.plugin"
    class_name: "DeetingCoreSdkPlugin"
    enabled_by_default: true
    is_always_on: true
    description: "Code-first execution mode: SDK search + sandbox code plan execution."
    tools:
      - "search_sdk"
      - "execute_code_plan"
