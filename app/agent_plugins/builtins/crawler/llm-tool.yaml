name: core.tools.crawler
version: "1.1.0"
description: "Provides web crawling capabilities using Playwright."
author: "Gemini CLI"
tools:
  - name: fetch_web_content
    description: "Fetch and extract content from a URL. Returns text, markdown, and structured data."
    parameters:
      type: object
      properties:
        url:
          type: string
          description: "The target URL to crawl."
        wait_for:
          type: string
          enum: ["load", "domcontentloaded", "networkidle"]
          default: "networkidle"
          description: "Wait strategy for page loading."
        timeout:
          type: integer
          default: 30000
          description: "Timeout in milliseconds."
        extract_markdown:
          type: boolean
          default: true
          description: "Whether to convert HTML to Markdown."
        extract_tables:
          type: boolean
          default: true
          description: "Whether to extract tables."
        extract_code:
          type: boolean
          default: true
          description: "Whether to extract code blocks."
        user_agent:
          type: string
          description: "Custom User-Agent string."
      required: ["url"]
  - name: submit_repo_ingestion
    description: "Ingest a skill repository and build a skill manifest asynchronously."
    parameters:
      type: object
      properties:
        repo_url:
          type: string
          description: "Git repository URL to ingest."
        revision:
          type: string
          default: "main"
          description: "Git branch/tag/commit to ingest."
        skill_id:
          type: string
          description: "Optional skill ID to use when persisting."
        runtime_hint:
          type: string
          description: "Optional runtime hint (e.g. python_library, node_library)."
      required: ["repo_url"]
  - name: convert_artifact_to_assistant
    description: "Convert one crawled knowledge artifact into a single assistant."
    parameters:
      type: object
      properties:
        artifact_id:
          type: string
          description: "The UUID of the ingested knowledge artifact."
        target_scope:
          type: string
          enum: ["user", "system"]
          default: "user"
          description: "Storage scope for the generated assistant. 'system' requires superuser."
      required: ["artifact_id"]
  - name: batch_convert_artifact_to_assistants
    description: "Split one crawled knowledge artifact into multiple assistants."
    parameters:
      type: object
      properties:
        artifact_id:
          type: string
          description: "The UUID of the ingested knowledge artifact."
        max_assistants:
          type: integer
          default: 20
          description: "Maximum number of assistants to create."
        target_scope:
          type: string
          enum: ["user", "system"]
          default: "user"
          description: "Storage scope for generated assistants. 'system' requires superuser."
      required: ["artifact_id"]
