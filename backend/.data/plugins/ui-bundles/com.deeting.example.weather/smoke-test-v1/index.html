<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: transparent; }
        .weather-gradient {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
        }
        .dark .weather-gradient {
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
        }
    </style>
</head>
<body class="p-2">
    <div id="card" class="weather-gradient rounded-3xl p-6 text-white shadow-lg max-w-sm">
        <div class="flex justify-between items-start">
            <div>
                <h2 id="city" class="text-2xl font-bold">--</h2>
                <p id="condition" class="text-blue-100 uppercase tracking-wider text-xs font-semibold">Loading...</p>
            </div>
            <div id="icon" class="text-4xl">--</div>
        </div>
        
        <div class="mt-8 flex items-end gap-2">
            <span id="temp" class="text-6xl font-light">--</span>
            <span class="text-2xl font-light mb-2">°C</span>
        </div>

        <div class="mt-6 grid grid-cols-2 border-t border-white/20 pt-4">
            <div>
                <p class="text-blue-100 text-[10px] uppercase">Humidity</p>
                <p id="humidity" class="font-medium">--%</p>
            </div>
            <div class="text-right">
                <p class="text-blue-100 text-[10px] uppercase">System Status</p>
                <p class="font-medium text-emerald-300">Live</p>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('message', (event) => {
            const { type, payload } = event.data;
            if (type === 'DEETING_DATA') {
                document.getElementById('city').innerText = payload.city;
                document.getElementById('condition').innerText = payload.condition;
                document.getElementById('temp').innerText = payload.temp;
                document.getElementById('humidity').innerText = payload.humidity + '%';
                document.getElementById('icon').innerText = payload.icon;
            }
        });
        window.parent.postMessage({ type: 'DEETING_PLUGIN_READY' }, '*');
    </script>
</body>
</html>
